services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_lab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restaurant_lab"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: restaurant-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  jmeter:
    image: justb4/jmeter:5.5
    container_name: restaurant-jmeter
    profiles: ["load-test"]
    working_dir: /tests
    volumes:
      - ./docs/jmeter:/tests
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - -n
      - -t
      - /tests/all-endpoints-load-test.jmx
      - -l
      - /tests/results/all-endpoints-results.jtl
      - -e
      - -o
      - /tests/results/report
      - -Jhost=host.docker.internal
      - -Jport=8080

volumes:
  postgres_data:
  pgadmin_data:
