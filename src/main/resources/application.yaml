spring:
  application:
    name: app
  datasource:
    url: jdbc:postgresql://localhost:5432/restaurant_lab
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
