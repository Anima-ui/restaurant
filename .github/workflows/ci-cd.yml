name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Validate
        run: ./mvnw -q -DskipTests validate

      - name: Test
        run: ./mvnw -q test

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t restaurant-app:${{ github.sha }} .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Skip deploy when hook is not configured
        if: env.RENDER_DEPLOY_HOOK_URL == ''
        run: echo "RENDER_DEPLOY_HOOK_URL is not configured. Deployment skipped."

      - name: Trigger Render deploy
        if: env.RENDER_DEPLOY_HOOK_URL != ''
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  healthcheck:
    name: Healthcheck
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    env:
      APP_HEALTH_URL: ${{ secrets.APP_HEALTH_URL }}

    steps:
      - name: Skip healthcheck when URL is not configured
        if: env.APP_HEALTH_URL == ''
        run: echo "APP_HEALTH_URL is not configured. Healthcheck skipped."

      - name: Check deployed application health
        if: env.APP_HEALTH_URL != ''
        run: |
          for attempt in {1..20}; do
            if curl -fsS "$APP_HEALTH_URL" | grep -q '"status":"UP"'; then
              echo "Application is healthy"
              exit 0
            fi
            echo "Healthcheck attempt $attempt failed. Waiting..."
            sleep 15
          done
          echo "Application did not become healthy"
          exit 1
